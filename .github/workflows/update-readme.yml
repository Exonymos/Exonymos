name: Update README with Latest Repos

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Update Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Exonymos
        run: node update-readme.js

      - name: Commit Changes
        run: |
          git config --global user.email "joybarot720@gmail.com"
          git config --global user.name "Exonymos"
          git add README.md
          git commit -m "chore: update README with latest repos [skip ci]" || echo "No changes to commit"
          git push
